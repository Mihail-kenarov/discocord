stages:
  - build
  - test
  - deploy

default:
  image: oven/bun:1
  tags:
    - docker
  before_script:
    - bun --version

build:
  stage: build
  script:
    - bun install --frozen-lockfile
    - bun run build
  artifacts:
    name: "next-artifacts-$CI_COMMIT_SHA"
    paths:
      - .next/
    when: on_success
    expire_in: 1 day

test:
  stage: test
  needs:
    - build
  image: cypress/browsers:latest
  tags:
    - docker
  variables:
    BUN_INSTALL: "/root/.bun"
  before_script:
    - apt-get update && apt-get install -y curl
    - curl -fsSL https://bun.sh/install | bash
    - export PATH="$BUN_INSTALL/bin:$PATH"
    - bun --version
    - bun install --frozen-lockfile
  script:
    - bun run build
    - |
      # Start the server in background
      bun run start &
      SERVER_PID=$!
      # Wait for server to be ready
      for i in $(seq 1 60); do
        if curl -s http://localhost:3000/favicon.ico > /dev/null 2>&1; then
          break
        fi
        sleep 1
      done
      # Run Cypress tests and capture exit code
      bun run cy:run
      CYPRESS_EXIT=$?
      # Kill the server
      kill $SERVER_PID 2>/dev/null || true
      # Exit with Cypress's exit code
      exit $CYPRESS_EXIT

deploy:
  stage: deploy
  needs:
    - build
  image: docker:24.0.5
  tags:
    - docker
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script: []
  script:
    - docker network inspect discocord_net >/dev/null 2>&1 || docker network create discocord_net
    - |
      # Pass CI variables to docker-compose via environment
      export GATEWAY_URL="${GATEWAY_URL:-http://discocord_gw:8080}"
      export NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY"
      export CLERK_SECRET_KEY="$CLERK_SECRET_KEY"
      export CLERK_WEBHOOK_SIGNING_SECRET="$CLERK_WEBHOOK_SIGNING_SECRET"
    - docker rm -f discocord_fe || true
    - docker compose up -d --build --force-recreate frontend
    - docker compose ps
