stages:
  - build
  - test
  - deploy

default:
  image: oven/bun:1
  tags:
    - docker          # 👈 ensures all jobs use your Docker runner by default
  before_script:
    - bun --version

build:
  stage: build
  script:
    - bun install --frozen-lockfile
    - bun run build
  artifacts:
    name: "next-artifacts-$CI_COMMIT_SHA"
    paths:
      - .next/
    when: on_success
    expire_in: 1 day

test:
  stage: test
  needs:
    - build
  image: cypress/browsers:latest
  tags:
    - docker
  variables:
    BUN_INSTALL: "/root/.bun"
  before_script:
    - apt-get update && apt-get install -y curl
    - curl -fsSL https://bun.sh/install | bash
    - export PATH="$BUN_INSTALL/bin:$PATH"
    - bun --version
    - bun install --frozen-lockfile
  script:
   
    - bun run build
    - bun run dev &
    - sleep 10   # wait for the server to start
    - bun run cy:run


deploy:
  stage: deploy
  needs:
    - build
  image: docker:24.0.5
  tags:
    - docker
  variables:
    # Use host Docker instead of DinD
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script: []
  script:
    # Ensure the shared network exists (so other containers like discocord_gw can connect)
    - docker network inspect discocord_net >/dev/null 2>&1 || docker network create discocord_net

    # Stop & remove any existing frontend container
    - if [ "$(docker ps -aq -f name=discocord_fe)" ]; then docker rm -f discocord_fe; fi

    # Remove previous image if it exists
    - if [ "$(docker images -q discocord_fe)" ]; then docker rmi -f discocord_fe; fi

    # Build the new frontend image
    - docker build \
        --build-arg NEXT_PUBLIC_API_URL="http://discocord_gw:8080" \
        --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" \
        --build-arg CLERK_SECRET_KEY="$CLERK_SECRET_KEY" \
        --build-arg CLERK_WEBHOOK_SIGNING_SECRET="$CLERK_WEBHOOK_SIGNING_SECRET" \
        --build-arg USE_PREBUILT=true \
        -t discocord_fe .

    # Run it on your host's Docker — will persist after pipeline finishes
    - docker run -d \
        --name discocord_fe \
        --network discocord_net \
        -p 3300:3000 \
        -e NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY="$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY" \
        -e CLERK_SECRET_KEY="$CLERK_SECRET_KEY" \
        -e CLERK_WEBHOOK_SIGNING_SECRET="$CLERK_WEBHOOK_SIGNING_SECRET" \
        discocord_fe
