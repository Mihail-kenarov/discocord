stages:
  - build
  - test
  - deploy

# Build Stage
build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
    - node_modules/
    - .next/

# Test Stage
test:
  stage: test
  image: cypress/browsers
  script:
    - npm ci
    - npx cypress run --browser chrome 

# Deploy Stage
deploy:
  stage: deploy
  script:
    # Ensure Docker network exists
    - if (-not (docker network ls --format "{{.Name}}" | Select-String -Pattern "^discocord_net$")) { docker network create discocord_net }

    # Remove existing container/image if present
    - if (docker ps -a --filter "name=discocord_fe" | Select-String "discocord_fe") { docker rm -f discocord_fe }
    - if (docker images -q discocord_fe) { docker rmi -f discocord_fe }

    # Build the image (no secret build args)
    - docker build --build-arg NEXT_PUBLIC_API_URL="http://discocord_gw:8080" -t discocord_fe .

    # Run container with secrets injected only at runtime
    - docker run -d `
        --name discocord_fe `
        --network discocord_net `
        -p 3300:3000 `
        -e NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$env:NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY `
        -e CLERK_SECRET_KEY=$env:CLERK_SECRET_KEY `
        -e CLERK_WEBHOOK_SIGNING_SECRET=$env:CLERK_WEBHOOK_SIGNING_SECRET `
        discocord_fe