stages:
  - build
  - test
  - deploy

# Build Stage
build:
  stage: build
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
    - node_modules/
    - .next/

# Test Stage
test:
  stage: test
  image: cypress/browsers
  script:
    - npm ci
    - npx cypress run --browser chrome 

# Deploy Stage
deploy:
  stage: deploy
  script:
    # Stop and remove the existing container if it exists
    - if (docker ps -a --filter "name=discocord_fe" | Select-String "discocord_fe") { docker rm -f discocord_fe }

    # Remove the old image if it exists
    - if (docker images -q discocord_fe) { docker rmi discocord_fe }

    # Build the Docker image (pass Clerk key as build-arg)
    - docker build --build-arg NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY -t discocord_fe .

    # Run the new container (ensure runtime env is passed too)
    - docker run -d -p 3300:3000 --name discocord_fe -e NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=$NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY discocord_fe
